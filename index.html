<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US Time Zones</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f13;
    font-family: 'Amazon Ember', 'SF Pro Display', -apple-system, 'Segoe UI', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .bar {
    text-align: center;
    padding: 1.5vmin 0;
    font-family: 'Amazon Ember Mono', 'SF Mono', 'Fira Code', monospace;
    font-size: clamp(1rem, 2.5vmin, 2rem);
    letter-spacing: 0.1em;
  }
  #local { color: #e0e0e0; }
  #utc { color: #ff9900; }
  #clocks {
    display: flex;
    flex: 1;
    gap: 2px;
  }
  .tz {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.5vmin;
  }
  .tz-name {
    font-size: clamp(0.9rem, 2vmin, 1.6rem);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 300;
    opacity: 0.8;
  }
  .tz-time {
    font-size: clamp(2rem, 7vmin, 6rem);
    font-weight: 200;
    letter-spacing: 0.02em;
  }
  .tz-time24 {
    font-size: clamp(1rem, 3vmin, 2.5rem);
    font-weight: 300;
    opacity: 0.5;
  }
  .P { background: rgba(192, 132, 252, 0.08); color: #c084fc; }
  .M { background: rgba(245, 158, 66, 0.08); color: #f59e42; }
  .C { background: rgba(52, 211, 153, 0.08); color: #34d399; }
  .E { background: rgba(96, 165, 250, 0.08); color: #60a5fa; }
</style>
</head>
<body>
<div id="local" class="bar"></div>
<div id="clocks"></div>
<div id="utc" class="bar"></div>
<script>
const zones = [
  { key: "P", name: "Pacific",  tz: "America/Los_Angeles" },
  { key: "M", name: "Mountain", tz: "America/Denver" },
  { key: "C", name: "Central",  tz: "America/Chicago" },
  { key: "E", name: "Eastern",  tz: "America/New_York" },
];

const clocksEl = document.getElementById('clocks');
const timeEls = {};
for (const z of zones) {
  const div = document.createElement('div');
  div.className = `tz ${z.key}`;
  div.innerHTML = `<div class="tz-name">${z.name}</div><div class="tz-time"></div><div class="tz-time24"></div>`;
  clocksEl.appendChild(div);
  timeEls[z.key] = { h12: div.querySelector('.tz-time'), h24: div.querySelector('.tz-time24') };
}

function tick() {
  const d = new Date();
  const localTz = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const localAbbr = d.toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();
  document.getElementById('local').textContent = `${localAbbr}  ${d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true })}`;
  document.getElementById('utc').textContent = `UTC  ${d.toLocaleTimeString('en-US', { timeZone: 'UTC', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false })}`;
  for (const z of zones) {
    const h12 = d.toLocaleTimeString('en-US', { timeZone: z.tz, hour: 'numeric', minute: '2-digit', hour12: true });
    const h24 = d.toLocaleTimeString('en-US', { timeZone: z.tz, hour: '2-digit', minute: '2-digit', hour12: false });
    timeEls[z.key].h12.textContent = h12;
    timeEls[z.key].h24.textContent = h24;
  }
}

tick();
setInterval(tick, 1000);
</script>
</body>
</html>
